<style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%); border-bottom: 1px solid #2d333b; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }

<script>
// === CONFIG ===
const SHEETS = {
  purchases: {
    id: '1EFmLH_5Y-BNQ5kc05zb2fg7gmvl5iya1a43NR48Xu_4',
    gid: '0'
  },
  sales: {
    id: '10RbZNdVA07G5HPKbfMpce8RF4WDJu8BhSyjZk5kbHpY',
    gid: '1484254259'
  }
};

let purchaseData = [];
let salesData = [];
let currentFilter = 'all';
let currentTab = 'purchases';
let autoRefreshTimer = null;

// === CSV PARSER ===
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field.trim()); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(f => f !== '')) rows.push(row);
        row = []; field = '';
      } else { field += c; }
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(f => f !== '')) rows.push(row); }
  return rows;
}

// === FETCH ===
async function fetchSheet(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return await resp.text();
}

// === STATUS HELPERS ===
const ACTIVE_STATUSES = ['under contract','under contract probate','pre-marketing','marketing','under contract to sell','co-wholesale','cash geeks owned','cash geeks purchase','wholesale','double close','mls purchase - ab','mls purchase - bc','straight sell','limbo','purchased/rental'];
const INACTIVE_STATUSES = ['complete','fell through'];

function ns(s) { return (s || '').toLowerCase().trim(); }
function isDataRow(status) { const s = ns(status); return ACTIVE_STATUSES.includes(s) || INACTIVE_STATUSES.includes(s); }
function isActive(s) { const n = ns(s); return ACTIVE_STATUSES.includes(n) && !n.includes('closed'); }

function statusBadge(status) {
  const s = ns(status);
  let cls = 's-uc';
  if (s === 'pre-marketing') cls = 's-pm';
  else if (s === 'marketing') cls = 's-mk';
  else if (s.includes('under contract to sell')) cls = 's-ucs';
  else if (s.includes('under contract') && s.includes('probate')) cls = 's-ucp';
  else if (s.includes('co-wholesale')) cls = 's-cw';
  else if (s.includes('cash geeks')) cls = 's-cgo';
  else if (s === 'wholesale') cls = 's-ws';
  else if (s === 'double close') cls = 's-dc';
  else if (s.includes('mls purchase')) cls = 's-mls';
  else if (s === 'straight sell') cls = 's-ss';
  else if (s === 'complete') cls = 's-cp';
  else if (s === 'fell through') cls = 's-ft';
  else if (s === 'limbo') cls = 's-lb';
  else if (s.includes('jv')) cls = 's-jv';
  else if (s === 'purchased/rental') cls = 's-cgo';
  return `<span class="sb ${cls}">${status}</span>`;
}

function chk(val) {
  const v = (val || '').toUpperCase().trim();
  if (v === 'TRUE' || v === 'YES') return '<span class="ck">&#10003;</span>';
  if (v === 'FALSE' || v === 'NO' || v === '') return '<span class="un">&#10007;</span>';
  return `<span class="wr">${val}</span>`;
}

function dlClass(dateStr) {
  if (!dateStr) return 'dok';
  const today = new Date(); today.setHours(0,0,0,0);
  const parts = dateStr.split('/');
  if (parts.length < 2) return 'dok';
  const m = parseInt(parts[0]) - 1, d = parseInt(parts[1]);
  let y = parts[2] ? parseInt(parts[2]) : today.getFullYear();
  if (y < 100) y += 2000;
  const dt = new Date(y, m, d);
  const diff = (dt - today) / 86400000;
  if (diff < 0) return 'do';
  if (diff <= 7) return 'ds';
  return 'dok';
}

function getDeadlineBadge(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const parts = dateStr.split('/');
  if (parts.length < 2) return '';
  const m = parseInt(parts[0]) - 1, d = parseInt(parts[1]);
  let y = parts[2] ? parseInt(parts[2]) : today.getFullYear();
  if (y < 100) y += 2000;
  const dt = new Date(y, m, d);
  const diff = (dt - today) / 86400000;
  if (diff < 0) return '<span class="deadline-badge deadline-overdue">Overdue</span>';
  if (diff <= 7) return '<span class="deadline-badge deadline-soon">Due Soon</span>';
  return '';
}

function prClass(dateStr) {
  const dc = dlClass(dateStr);
  if (dc === 'do') return 'ph';
  if (dc === 'ds') return 'pmd';
  return '';
}

function countClosingThisWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7);
  let count = 0;
  function checkDate(dateStr) {
    if (!dateStr) return;
    const parts = dateStr.split('/');
    if (parts.length < 2) return;
    let y = parts[2] ? parseInt(parts[2]) : today.getFullYear();
    if (y < 100) y += 2000;
    const dt = new Date(y, parseInt(parts[0]) - 1, parseInt(parts[1]));
    if (dt >= today && dt <= weekEnd) count++;
  }
  purchaseData.filter(r => isActive(r[0])).forEach(r => checkDate(r[22]));
  salesData.filter(r => isActive(r[0])).forEach(r => checkDate(r[9]));
  return count;
}

function countFollowUps(data) {
  return data.filter(r => {
    const followUpCol = data === purchaseData ? 3 : 5;
    return (r[followUpCol] || '').trim() !== '';
  }).length;
}

const AB_NEXT_ACTIONS = {
  'Contract Filed': 'File the A-B contract from TJ',
  'EMD': 'Collect earnest money deposit',
  'Title Search': 'Order title search',
  'Muni': 'Order municipal search',

const BC_NEXT_ACTIONS = {
  'Contract Filed': 'File the B-C contract from TJ',
  'Buyer Intro': 'Send buyer intro email to title',
  'Seller Intro': 'Send seller/JV intro email to title',
  'Title Intro': 'Confirm title company intro sent',
  'Survey': 'Order survey',
  'Appraisal': 'Schedule appraisal',
  'Insp Period': 'Track inspection period deadline',
  'EMD Due': 'Confirm EMD due date with buyer',
  'EMD': 'Collect EMD from buyer',
  'IPR': 'Get inspection period release',
  'Title': 'Confirm title clearance',
  'Muni': 'Order municipal search',
  'Prelim HUD': 'Request preliminary HUD from title',
  'Funding': 'Confirm funding secured',
  'Closed': 'Schedule closing'
};

function isStepDone(row, step) {
  const val = (row[step.col] || '').trim().toUpperCase();
  if (step.type === 'check') return val === 'TRUE' || val === 'YES';
  if (step.type === 'date') return val !== '' && val !== 'FALSE' && val !== 'NO';
  if (step.type === 'value') return val !== '' && val !== 'FALSE' && val !== 'NO' && val !== '0' && val !== '$0';
  return val !== '';
}

function getPipelineState(row, pipeline) {
  const steps = pipeline.map((step, i) => ({ ...step, done: isStepDone(row, step), index: i }));
  const currentIdx = steps.findIndex(s => !s.done);
  const allDone = currentIdx === -1;
  return { steps, currentIdx: allDone ? steps.length : currentIdx, allDone,
    currentStep: allDone ? null : steps[currentIdx],
    nextStep: allDone ? null : (currentIdx + 1 < steps.length ? steps[currentIdx + 1] : null) };
}

function renderPipelineBar(row, pipeline) {
  const state = getPipelineState(row, pipeline);
  let html = '<div class="pipeline-bar">';
  for (let i = 0; i < state.steps.length; i++) {
    let cls = 'upcoming';
    if (state.steps[i].done) cls = 'done';
    else if (i === state.currentIdx) cls = 'current';
    html += '<div class="pipeline-step ' + cls + '"><span class="step-tip">' + state.steps[i].name + (state.steps[i].done ? ' \u2713' : '') + '</span></div>';
  }
  return html + '</div>';
}

function renderCurrentStep(row, pipeline, actions) {
  const state = getPipelineState(row, pipeline);
  if (state.allDone) return '<span class="step-label" style="color:#3fb950;">\u2713 All Complete</span>';
  return '<span class="step-label step-current">\u25B6 ' + state.currentStep.name + '</span>';
}

function renderNextAction(row, pipeline, actions) {
  const state = getPipelineState(row, pipeline);
  if (state.allDone) return '<span class="step-next">Ready to close</span>';
  return '<span class="step-next-action">' + (actions[state.currentStep.name] || '') + '</span>';
}

// === FILTER ===
function filterRows(rows, statusCol) {
  let f = rows;
  if (currentFilter !== 'all' && currentFilter !== 'complete') {
    f = rows.filter(r => ns(r[statusCol]).includes(currentFilter));
  } else if (currentFilter === 'complete') {
    f = rows.filter(r => ns(r[statusCol]) === 'complete' || ns(r[statusCol]) === 'fell through');
  }
  const q = document.getElementById('searchBox').value.toLowerCase();
  if (q) f = f.filter(r => r.join(' ').toLowerCase().includes(q));
  return f;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doFilter() { render(); }

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-purchases').style.display = tab === 'purchases' ? 'block' : 'none';
  document.getElementById('tab-sales').style.display = tab === 'sales' ? 'block' : 'none';
}

function render() { renderPurchases(); renderSales(); }

// === STATS ===
function updateStats() {
  const allP = purchaseData.filter(r => isDataRow(r[0]) && isActive(r[0]));
  const allS = salesData.filter(r => isDataRow(r[0]) && isActive(r[0]));
  document.getElementById('statActive').textContent = allP.length + allS.length;
  document.getElementById('statUC').textContent = allP.filter(r => ns(r[0]).includes('under contract')).length;
  document.getElementById('statPM').textContent = allP.filter(r => ns(r[0]) === 'pre-marketing').length;
  document.getElementById('statUrgent').textContent = countClosingThisWeek();
  document.getElementById('statDone').textContent = purchaseData.filter(r => ns(r[0]) === 'complete').length + salesData.filter(r => ns(r[0]) === 'complete').length;
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast success show';
  setTimeout(() => t.className = 'toast', 3000);
}

// === AUTO REFRESH ===
function toggleAutoRefresh() {
  if (document.getElementById('autoRefresh').checked) {
    startAutoRefresh();
  } else {
    if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    loadAllData(true);
  }, 5 * 60 * 1000);
}

// === MAIN LOAD ===
async function loadAllData(silent) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = 'Loading...';
  if (!silent) document.getElementById('lastUpdated').textContent = 'Refreshing...';

  try {
    const [pCSV, sCSV] = await Promise.all([
      fetchSheet(SHEETS.purchases.id, SHEETS.purchases.gid),
      fetchSheet(SHEETS.sales.id, SHEETS.sales.gid)
    ]);

    const pRows = parseCSV(pCSV);
    const sRows = parseCSV(sCSV);

    purchaseData = pRows.slice(1);
    salesData = sRows.slice(1);

    render();
    updateStats();

    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('lastUpdated').textContent = `Live — ${timeStr}`;
    if (silent) showToast('Dashboard refreshed');

  } catch (err) {
    const msg = err.message || String(err);
    document.getElementById('tab-purchases').innerHTML = `
      <div class="error">
        <div style="font-size:40px;margin-bottom:12px;">&#9888;</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:16px;">Could not load sheet data</div>
        <div class="steps">
          <p style="margin-bottom:12px;">The Google Sheets need to be <strong>published to the web</strong> for this dashboard to work:</p>
          <ol>
            <li>Open each Google Sheet</li>
            <li>Go to <strong>File > Share > Publish to the web</strong></li>
            <li>Select the correct tab and choose <strong>CSV</strong></li>
            <li>Click <strong>Publish</strong></li>
            <li>Come back here and click <strong>Refresh</strong></li>
          </ol>
          <p style="margin-top:16px;color:#8b949e;">Error: ${msg}</p>
        </div>
      </div>`;
    document.getElementById('lastUpdated').textContent = 'Error loading data';
  }

  btn.classList.remove('loading');
  btn.textContent = 'Refresh';
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    loadAllData();
  }
  if (e.key === '1' && document.activeElement.tagName !== 'INPUT') {
    document.querySelectorAll('.tab')[0].click();
  }
  if (e.key === '2' && document.activeElement.tagName !== 'INPUT') {
    document.querySelectorAll('.tab')[1].click();
  }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchBox').focus();
  }
});

// Boot
loadAllData();
if (document.getElementById('autoRefresh').checked) startAutoRefresh();
</script>
